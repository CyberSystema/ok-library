name = "ok-library-api"
main = "src/index.ts"
compatibility_date = "2026-04-23"

[observability.logs]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "ok_library"
database_id = "55bc2aa5-fa61-4597-b47f-b645fba5ed44"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "6faf64c9dffb407985dc58d180b4eb99"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "ok-library-assets"

# ── Optional: semantic search (Vectorize + Workers AI) ───────────────────
# Uncomment after creating the index, e.g.:
#   wrangler vectorize create ok-library-books \
#     --dimensions=768 --metric=cosine
# The dimension MUST match the embedding model. We default to BGE base
# (`@cf/baai/bge-base-en-v1.5`, 768 dims). Switch model + dims together.
# When either binding is missing the semantic endpoints respond 503 and
# the rest of the app keeps working unchanged.
# [[vectorize]]
# binding = "VECTORIZE"
# index_name = "ok-library-books"
#
# [ai]
# binding = "AI"

[vars]
APP_ENV = "production"
JWT_ISSUER = "ok-library-api"
ACCESS_TOKEN_TTL_SECONDS = "43200"
# CSV of allowed origins. `app://ok-library` is the Electron desktop shell's
# renderer origin (see apps/desktop). The Pages web app uses bearer-token auth,
# so cross-site cookies are no longer required for it to work on Safari.
CORS_ORIGIN = "https://ok-library.pages.dev,app://ok-library"
